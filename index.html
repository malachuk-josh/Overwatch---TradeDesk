<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="color-scheme" content="dark light" />
    <!-- Home-screen standalone mode: draw under the status bar so the app's dark backdrop
         fills it, instead of iOS painting a default light bar over theme-color. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Overwatch is a daily market bias desk for live market context, thesis building, and morning-note publishing."
    />
    <!-- Bump ?v= whenever the mark changes: browsers cache favicons aggressively (often past a
         hard reload), so the version query is what forces them off a stale logo. The typed SVG
         link is primary; the PNG is the fallback for engines that don't render SVG favicons, so
         they show the current mark instead of falling back to a cached /favicon.ico. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192-v8.png" />
    <!-- iOS home-screen icon (iOS ignores the SVG favicon + manifest for "Add to Home Screen").
         iOS caches this by URL *path* and largely ignores ?v= query strings, so the filename itself
         carries the version (-v8) — bump it (and the manifest + icon names) on any future icon change. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-v8.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Warm the DNS + TLS handshake to TradingView's hosts up front so the embedded charts and
         economic calendar (loaded lazily when those tabs open) don't pay a cold connection on top
         of their download + iframe boot. preconnect for the origins actually used; dns-prefetch as a
         cheap fallback for engines that ignore preconnect. -->
    <link rel="preconnect" href="https://s3.tradingview.com" crossorigin />
    <link rel="preconnect" href="https://s.tradingview.com" crossorigin />
    <link rel="preconnect" href="https://www.tradingview.com" crossorigin />
    <link rel="dns-prefetch" href="https://s3.tradingview.com" />
    <link rel="dns-prefetch" href="https://s.tradingview.com" />
    <link rel="dns-prefetch" href="https://www.tradingview.com" />
    <link rel="dns-prefetch" href="https://data.tradingview.com" />
    <title>Overwatch // Daily Bias Desk</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
