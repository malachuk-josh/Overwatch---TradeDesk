    />

    <!-- iOS home-screen icon (iOS ignores the SVG favicon + manifest for "Add to Home Screen") -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Overwatch // Daily Bias Desk</title>
