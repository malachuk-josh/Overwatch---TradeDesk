<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Light-mode home-screen / PWA app icon. Mirrors the dark favicon.svg mark (crosshair + pulse)
       but recolored to the app's default light theme: a brushed-silver panel, soft blue glow, and a
       brand-blue mark. The browser-tab favicon.svg stays dark; this drives the installed PNG icons. -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#EEF2F8"/>
      <stop offset="1" stop-color="#D3DBEA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="-62" x2="0" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9FB2D0" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#base)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#glow)"/>
  <path d="M0 40 Q0 0 40 0 L140 0 Q180 0 180 40 L180 82 Q90 108 0 82 Z" fill="url(#sheen)"/>

  <g transform="translate(90 90) scale(1.15)" stroke="url(#mark)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="-62" x2="0" y2="62" stroke-width="2.5" opacity="0.32" stroke="#3B82F6"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke-width="2.5" opacity="0.32" stroke="#3B82F6"/>
    <circle cx="0" cy="0" r="37" stroke-width="5"/>
    <circle cx="0" cy="0" r="30" stroke-width="2.5" opacity="0.45" stroke="#3B82F6"/>
    <path d="M-22 14 L-13 6 L-6 -8 L2 5 L8 -1 L15 4 L22 14" stroke-width="5"/>
  </g>

  <rect x="2" y="2" width="176" height="176" rx="38.5" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <rect x="4.5" y="4.5" width="171" height="171" rx="36" fill="none" stroke="#0F1721" stroke-opacity="0.07" stroke-width="1"/>
</svg>
