<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Light-mode home-screen / PWA app icon. Near-white glass panel with the brand crosshair + pulse
       mark in a deep saturated brand blue and a soft blue glow. A glossy reflection sweeps over the
       top (including the top of the mark) for a polished "under glass" look, with a specular catch-
       light and a soft bottom bounce. The browser-tab favicon.svg stays dark; this drives the PNGs. -->
  <defs>
    <!-- panel: bright at top, easing to a soft blue-grey at the base so the top gloss has something
         to read against (a flat white panel hides the polish) -->
    <linearGradient id="base" x1="0.12" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.42" stop-color="#EEF3FB"/>
      <stop offset="0.78" stop-color="#DCE6F3"/>
      <stop offset="1" stop-color="#CBD8EA"/>
    </linearGradient>
    <!-- soft blue brand glow behind the mark -->
    <radialGradient id="glowbg" cx="0.5" cy="0.44" r="0.62">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- specular polish bloom, upper-left — the bright "wet glass" catch-light -->
    <radialGradient id="spec" cx="0.3" cy="0.2" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- deep, saturated brand-blue mark gradient -->
    <linearGradient id="mark" x1="0" y1="-62" x2="0" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82FF"/>
      <stop offset="0.55" stop-color="#1E63EE"/>
      <stop offset="1" stop-color="#123FC8"/>
    </linearGradient>
    <!-- soft blue glow around the mark — a static echo of the app's pulsing glow -->
    <filter id="markglow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.6" flood-color="#4E9BFF" flood-opacity="0.55"/>
    </filter>
    <!-- glossy reflection that sits OVER the mark: bright at the very top, fading out along a curved
         lower edge — the signature glass-polish highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- faint light bounce along the bottom edge, like glass catching the surface below it -->
    <linearGradient id="bounce" x1="0" y1="180" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- polished rim: bright chrome highlight up top easing to steel at the base -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8DA0C0" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#base)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#glowbg)"/>

  <g transform="translate(90 90) scale(1.8)" stroke="url(#mark)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#markglow)">
    <line x1="0" y1="-62" x2="0" y2="62" stroke-width="3.3" opacity="0.55" stroke="#1E63EE"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke-width="3.3" opacity="0.55" stroke="#1E63EE"/>
    <circle cx="0" cy="0" r="37" stroke-width="7.4"/>
    <circle cx="0" cy="0" r="30" stroke-width="3.3" opacity="0.66" stroke="#1E63EE"/>
    <path d="M-22 14 L-13 6 L-6 -8 L2 5 L8 -1 L15 4 L22 14" stroke-width="7.4"/>
  </g>

  <!-- glass overlays, drawn over the mark for the "under glass" polish -->
  <path d="M0 40 Q0 0 40 0 L140 0 Q180 0 180 40 L180 72 Q90 106 0 72 Z" fill="url(#gloss)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#spec)"/>
  <path d="M0 138 Q90 116 180 138 L180 140 Q180 180 140 180 L40 180 Q0 180 0 140 Z" fill="url(#bounce)"/>

  <rect x="2" y="2" width="176" height="176" rx="38.5" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <rect x="4.5" y="4.5" width="171" height="171" rx="36" fill="none" stroke="#0F1721" stroke-opacity="0.06" stroke-width="1"/>
</svg>
