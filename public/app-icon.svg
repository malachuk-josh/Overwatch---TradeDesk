<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Light-mode home-screen / PWA app icon. Mirrors the dark favicon.svg mark (crosshair + pulse)
       but recolored to the app's default light theme with a soft silver glass-polish finish:
       a cool brushed-silver panel, a glossy sheen sweep, a specular highlight bloom, and a bright
       top rim fading to darker silver — the brand-blue mark sits on top. The browser-tab
       favicon.svg stays dark; this drives the installed PNG icons. -->
  <defs>
    <!-- brushed-silver panel: light at top-left, cooler steel toward the bottom for depth -->
    <linearGradient id="base" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#FCFDFF"/>
      <stop offset="0.4" stop-color="#E9EEF6"/>
      <stop offset="0.72" stop-color="#D2DAE8"/>
      <stop offset="1" stop-color="#BAC5D8"/>
    </linearGradient>
    <!-- soft blue brand glow behind the mark -->
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.62">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- specular polish bloom, upper-left, gives the "wet glass" catch-light -->
    <radialGradient id="spec" cx="0.32" cy="0.24" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- glossy sheen sweep across the top third -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- soft inner shading at the bottom to seat the glass -->
    <linearGradient id="shade" x1="0" y1="0.55" x2="0" y2="1">
      <stop offset="0" stop-color="#8FA0BC" stop-opacity="0"/>
      <stop offset="1" stop-color="#7C8DAA" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="-62" x2="0" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <!-- polished rim: bright chrome highlight up top easing to steel at the base -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8DA0C0" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#base)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#shade)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#glow)"/>
  <!-- glossy sheen sweep over the top -->
  <path d="M0 40 Q0 0 40 0 L140 0 Q180 0 180 40 L180 84 Q90 112 0 84 Z" fill="url(#sheen)"/>
  <!-- specular catch-light -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#spec)"/>

  <g transform="translate(90 90) scale(1.47)" stroke="url(#mark)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="-62" x2="0" y2="62" stroke-width="2.5" opacity="0.30" stroke="#3B82F6"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke-width="2.5" opacity="0.30" stroke="#3B82F6"/>
    <circle cx="0" cy="0" r="37" stroke-width="5"/>
    <circle cx="0" cy="0" r="30" stroke-width="2.5" opacity="0.42" stroke="#3B82F6"/>
    <path d="M-22 14 L-13 6 L-6 -8 L2 5 L8 -1 L15 4 L22 14" stroke-width="5"/>
  </g>

  <rect x="2" y="2" width="176" height="176" rx="38.5" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <rect x="4.5" y="4.5" width="171" height="171" rx="36" fill="none" stroke="#0F1721" stroke-opacity="0.06" stroke-width="1"/>
</svg>
