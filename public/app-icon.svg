<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Light-mode home-screen / PWA app icon. Clean near-white glass panel with the brand crosshair +
       pulse mark in a deep, saturated brand blue, heavier strokes, and a soft blue glow (a static nod
       to the app's pulsing-glow motif). The brighter panel lifts contrast so the mark reads bold.
       The browser-tab favicon.svg stays the dark mark; this drives the installed PNG icons. -->
  <defs>
    <!-- clean near-white panel: brighter than the old silver so the blue mark pops -->
    <linearGradient id="base" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F6F9FD"/>
      <stop offset="1" stop-color="#E7EEF7"/>
    </linearGradient>
    <!-- soft blue brand glow behind the mark -->
    <radialGradient id="glowbg" cx="0.5" cy="0.44" r="0.62">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- specular polish bloom, upper-left, gives the "wet glass" catch-light -->
    <radialGradient id="spec" cx="0.32" cy="0.24" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- glossy sheen sweep across the top third -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- soft inner shading at the bottom to seat the glass -->
    <linearGradient id="shade" x1="0" y1="0.55" x2="0" y2="1">
      <stop offset="0" stop-color="#8FA0BC" stop-opacity="0"/>
      <stop offset="1" stop-color="#7C8DAA" stop-opacity="0.14"/>
    </linearGradient>
    <!-- deep, saturated brand-blue mark gradient -->
    <linearGradient id="mark" x1="0" y1="-62" x2="0" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82FF"/>
      <stop offset="0.55" stop-color="#1E63EE"/>
      <stop offset="1" stop-color="#123FC8"/>
    </linearGradient>
    <!-- soft blue glow around the mark — a static echo of the app's pulsing glow -->
    <filter id="markglow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.6" flood-color="#4E9BFF" flood-opacity="0.55"/>
    </filter>
    <!-- polished rim: bright chrome highlight up top easing to steel at the base -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8DA0C0" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#base)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#shade)"/>
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#glowbg)"/>
  <!-- glossy sheen sweep over the top -->
  <path d="M0 40 Q0 0 40 0 L140 0 Q180 0 180 40 L180 84 Q90 112 0 84 Z" fill="url(#sheen)"/>
  <!-- specular catch-light -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#spec)"/>

  <g transform="translate(90 90) scale(1.47)" stroke="url(#mark)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#markglow)">
    <line x1="0" y1="-62" x2="0" y2="62" stroke-width="3.2" opacity="0.55" stroke="#1E63EE"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke-width="3.2" opacity="0.55" stroke="#1E63EE"/>
    <circle cx="0" cy="0" r="37" stroke-width="7.2"/>
    <circle cx="0" cy="0" r="30" stroke-width="3.2" opacity="0.66" stroke="#1E63EE"/>
    <path d="M-22 14 L-13 6 L-6 -8 L2 5 L8 -1 L15 4 L22 14" stroke-width="7.2"/>
  </g>

  <rect x="2" y="2" width="176" height="176" rx="38.5" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <rect x="4.5" y="4.5" width="171" height="171" rx="36" fill="none" stroke="#0F1721" stroke-opacity="0.06" stroke-width="1"/>
</svg>
